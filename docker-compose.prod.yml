# Env for Dokploy:
#   DVM_SECRET_KEY (required) - hex private key for DVM. Generate: openssl rand -hex 32. Set on dvm service.
#   VITE_DVM_PUBKEY (optional) - DVM public key (64 hex) for client default. Set as build arg when building client.
#   RELAYS (optional) - default wss://relay.brainrot.rehab. Set on dvm service.

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        - VITE_DVM_PUBKEY=${VITE_DVM_PUBKEY}
    restart: always
    expose:
      - "3000"
    networks:
      - dokploy-network

  dvm:
    build:
      context: ./dvm
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - RELAYS=${RELAYS:-wss://relay.brainrot.rehab}
      - DVM_SECRET_KEY=${DVM_SECRET_KEY}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
