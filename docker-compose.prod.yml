# Env: DVM_SECRET_KEY (required) - hex private key for DVM's Nostr identity. Generate: openssl rand -hex 32
# Optional: RELAYS (default wss://relay.brainrot.rehab). Configure domain via Dokploy UI.

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    restart: always
    expose:
      - "3000"
    networks:
      - dokploy-network

  dvm:
    build:
      context: ./dvm
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - RELAYS=${RELAYS:-wss://relay.brainrot.rehab}
      - DVM_SECRET_KEY=${DVM_SECRET_KEY}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
