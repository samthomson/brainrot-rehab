# Env vars from Dokploy Environment are written to .env; compose substitutes them at build time.
services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_DVM_PUBKEY: ${VITE_DVM_PUBKEY}
        VITE_RELAYS: ${RELAYS}
        VITE_BLOSSOM_UPLOAD_URL: ${VITE_BLOSSOM_UPLOAD_URL}
        VITE_PLAUSIBLE_DOMAIN: ${VITE_PLAUSIBLE_DOMAIN}
        VITE_PLAUSIBLE_SRC: ${VITE_PLAUSIBLE_SRC}
    restart: always
    expose:
      - "3000"
    networks:
      - dokploy-network

  dvm:
    build:
      context: ./dvm
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      - RELAYS=${RELAYS:-wss://relay.brainrot.rehab}
      - DVM_SECRET_KEY=${DVM_SECRET_KEY}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
